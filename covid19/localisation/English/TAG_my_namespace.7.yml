  TAG_my_namespace.7.t: "城中富婆"
  TAG_my_namespace.7.a: "你老母跳老舞"
  TAG_my_namespace.7.d: “她是城中著名的富婆，早年憑著投資股市與樓市的精準眼光，順理成章地躋身上流。然而光陰似箭，曾經受盡無數狂蜂浪蝶追求、被譽為出水芙蓉的她，今年已是一位七十五歲的滄桑婦人。
​作為富婆，物質與金錢的刺激她早便麻木了。可任憑銀行戶口的數字再長，也依舊填補不了她心靈深處的寂寞與空虛。
​三十歲那年，她曾與另一位商界名人締結了一段名震全城的「豪門婚姻」。在鎂光燈前，他們門當戶對，像極一對神仙眷侶；但在那層金箔背後，卻是丈夫長期的精神虐待與暴力。丈夫在外面燈紅酒綠、花天酒地，婚外情一段接一段。她為了兩家面子生吞活剝地忍了二十年，直到那天，丈夫竟然將年輕的情婦堂而皇之地帶上他們一起數了無數遍的婚床，甚至還指著她的鼻子叫她滾出去。
​他們很快便離婚了，那一年她五十歲，世界徹底崩潰，瞬間從風光的名媛墮落成上流圈子茶餘飯後的笑柄。離婚後，她不再是昔日風光的名媛，還要默默承受著上流圈子的冷眼與茶餘飯後的嘲笑。
​此後廿五年，她試圖用拼命工作來麻醉自己。直到有天她駐足鏡前，看著鏡中那張被歲月雕琢得充滿鄒紋的臉龐，才驚覺自己只是在虛耗最後的暮年。
她無法接受已經老去的自己，在一個孤寂的深夜，她終於忍不住撥通了閨蜜的電話傾訴。
​電話那頭傳來一陣喧鬧的電子音樂，閨蜜扯大嗓門笑著說：「唉，你寂寞啫！搵個小鮮肉陪下咪得囉？我而家晚晚落『Starlight Club』玩，嗰度唔單止有頂級靚酒，仲有大把聽話嘅小鮮肉，可以同你『親密接觸』！你今晚都過嚟一齊玩啦——」"