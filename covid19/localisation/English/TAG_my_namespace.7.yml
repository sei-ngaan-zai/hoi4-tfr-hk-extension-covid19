l_english:
  TAG_my_namespace.7.t: "城中富婆"
  TAG_my_namespace.7.a: "你老母跳老舞"
  TAG_my_namespace.7.d: “她是城中一名著名富婆，早年投資股市樓市得利而躋身上流，然而光陰似箭，曾經受無數人追求示愛的出水芙蓉，今年已經是一位七十五歲的阿姨。作為一個富婆，所有物質和金錢上的刺激都她已經滿足過一遍了，但是無論她金錢有幾多，也依然無法填補她心靈上的寂寞與空虛 一一 她三十歲左右時曾經和另一位商界名人有過一段婚姻，令人羨慕。可是就在這一段門當户對的婚姻背後，卻隱藏住丈夫長期的虐待與暴力。丈夫長期在外面鬼混，燈紅酒綠、花天酒地，還有過數段婚外情，她都一一忍下了，可是，當丈夫帶了二奶上房還叫她滾出去時，她徹底崩潰了。很快兩人便離了婚，這一年她四十四歲，早已不是昔日那位名媛，還要承受他人的冷眼及嘲笑，她試圖以拼命工作去彌補心靈上的空虛，可是當她再照鏡子時，卻發現自己只是在浪費最後一點美好年華，她無法接受這樣的自己，於是撥了通電話和她的一位朋友傾訴。電話裏頭的一端說：「你寂寞啫，揾個小鮮肉陪咪得囉！我而家日日落『Starlight Club』玩，唔止有靚酒水呀，仲有小鮮肉可以俾你同佢哋『親密接觸』！你今晚都過嚟一齊玩啦 一一」”
