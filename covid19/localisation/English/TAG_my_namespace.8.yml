  TAG_my_namespace.8.t: "洪門宴"
  TAG_my_namespace.8.a: "只許州官放火，不許百姓點燈"
  TAG_my_namespace.8.d: "一月三日晚上，灣仔一間西班牙餐廳。一個男子在餐廳舉起酒杯，看起來醉醺醺的，餐廳裏頭掛有不少寫着「生日快樂」的橫額，長檯上也放滿一兜兜的食物。
  那名男子左手舉起盛滿紅酒的酒杯，右手拎起咪高峰扯開喉嚨喊道：「各位好朋友、好同志！欢迎来到我洪为民的生日派对，今天所有的食物酒水我全包了，大家不用客气！」
他打個酒嗝，整個人搖搖晃晃，繼續高調發表偉論：「新年新气象，现在香港政通人和，在座的每一位，往后在体制内都是前途无量、步步高升！只要咱们齐心协力把那些黄丝黑暴分子扫干净，未来的香港就是我们的天下！为大家的光明仕途干杯！」
  ​席間一眾政商名流、高官顯貴紛紛舉杯響應，觥籌交錯，將防疫規例與晚市禁令通通拋諸腦後。洪為民沒放下咪高峰，而是腆著肚子走向曾鳳珠。他放下酒杯，順勢用左手搭着她的膊頭：「美女，今天是我的生日，赏个面一起唱几首歌呗。」
  曾鳳珠欲拒還迎地嬌嗔道：「那我不就要脱掉口罩？你不怕那些防疫规例吗？」
  「怕什么，在场的都是体制內自己人，特区政府的規矩哪會查到我們頭上？況且在场也没人在戴口罩。」
  說罷，他便以五音不全的歌聲嚎叫着老掉牙的情歌，身體愈貼愈近，絲毫不在意自己的失態。
唱罷，洪為民便摟住曾鳳珠，一把嘴直接親了下去，二人的嘴唇死死地互相吸吮，他的舌頭肆無忌憚地進佔她的口腔，瘋狂糾纏，有如水乳交融，卻又在特權和酒精的催化下顯得愈發荒淫而醜陋。
​正當兩人親熱得難解難分、全場高官舉杯痛飲之際，餐廳的大門再度被推開。
一個胖女人快步走進會場，是王詩雅。她氣喘吁吁地說：「對唔住遲咗少少嚟，個 party 未開始吖嘛？」
洪為民醉眼朦朧地笑着回道：「王小姐没事儿，快点過来坐下吃点东西喝喝酒吧。」
​「好啊，今晚預咗同你飲餐飽！」王詩雅笑著迎上去。她隨手接過一杯威士忌，順勢清了清有些乾涸的喉嚨。
​席間杯觥交錯，笑聲震天，完全沒人猜到之後會發生甚麼事。"
