l_english:
  TAG_my_namespace.8.t: "城中富婆"
  TAG_my_namespace.8.a: "你老母跳老舞"
  TAG_my_namespace.8.d: “一月三日晚上，灣仔一間西班牙餐廳。一個男子在餐廳舉起酒杯，看起來醉醺醺的，餐廳裏頭掛有不少寫着「生日快樂」的橫額，長檯上也放滿一兜兜的食物，似乎在搞生日派對。那名男子左手舉起盛滿紅酒的酒杯，右手拎起咪高峰：「各位同志好，欢迎來到我洪为民的生日派對，今天所有的食物酒水我全包了，大家不用客气。」​他打個酒嗝，繼續高調發表偉論：「只要各位继续乖乖地听党的话，替党搞定香港的黄丝软对抗分子和外国勢力的干扰，将来大家也能像我一样成为人大代表，成为体制內的一分子。为在座各位的仕途干杯！」​眾人紛紛舉杯響應，觥籌交錯。洪為民沒放下咪高峰，而是腆著肚子走向曾鳳珠。他放下酒杯，順勢用左手搭着她的膊頭：「美女，今天是我的生日，赏个面一起唱几首歌呗。」曾鳳珠欲拒還迎地嬌嗔道：「那我不就要脱掉口罩？你不怕那些防疫规例吗？」「怕什么，我可是人大，小小香港的法律哪能管着我？況且在场也没人在戴口罩。」說罷，他便以五音不全的歌聲嚎叫着老掉牙的歌，絲亳不在意自己的失態。”