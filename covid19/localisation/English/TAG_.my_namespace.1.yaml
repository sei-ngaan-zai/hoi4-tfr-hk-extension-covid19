l_english:
  TAG_my_namespace.1.t: "香港首宗病例"
  TAG_my_namespace.1.a: "我們必須做點甚麼"
  TAG_my_namespace.1.d: "香港今日確診首宗武漢肺炎感染病例。患者下午在伊利沙伯醫院隔離治療，據知兩次檢測亦呈陽性反應。該名男患者約傍晚6時15分，在伊院由多名全副保護裝備的救護員運送上救護車，約20分鐘後抵達瑪嘉烈醫院。另有消息指，再有一名患者高度懷疑確診武漢肺炎，將由威爾斯親王醫院送往瑪嘉烈醫院隔離治療。患者39歲，由武漢來港，昨日由武漢車站乘坐G1015高鐵到深圳北，其後於晚上由深圳北乘坐G5607班次抵西九龍站。患者當日出現發燒和鼻塞徵狀，被港口衞生處職員發現，他向職員表示曾到武漢，其後被送到伊利沙伯醫院作進一步檢測。"
