  TAG_my_namespace.8b.t: "洪門宴（二）"
  TAG_my_namespace.8b.a: "繼續睇"
  TAG_my_namespace.8b.d: "唱罷，洪為民便摟住曾鳳珠，一把嘴直接親了下去，二人的嘴唇死死地互相吸吮，他的舌頭肆無忌憚地進佔她的口腔，瘋狂糾纏，有如水乳交融，卻又在特權和酒精的催化下顯得愈發荒淫而醜陋。
​正當兩人親熱得難解難分、全場高官舉杯痛飲之際，餐廳的大門再度被推開。
一個胖女人快步走進會場，是王詩雅。她氣喘吁吁地說：「對唔住遲咗少少嚟，個 party 未開始吖嘛？」
洪為民醉眼朦朧地笑着回道：「王小姐没事儿，快点過来坐下吃点东西喝喝酒吧。」
​「好啊，今晚預咗同你飲餐飽！」王詩雅笑著迎上去。她隨手接過一杯威士忌，順勢清了清有些乾涸的喉嚨。
​席間杯觥交錯，笑聲震天，完全沒人猜到這場生日會將會葬送掉他們的仕途，更撕開全港無數無辜市民的疫災地獄。"