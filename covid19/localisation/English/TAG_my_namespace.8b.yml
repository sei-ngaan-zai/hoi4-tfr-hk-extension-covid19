  TAG_my_namespace.8b.t: "洪門宴（二）"
  TAG_my_namespace.8b.a: "繼續睇"
  TAG_my_namespace.8b.d: "唱罷，洪為民便摟住曾鳳珠，一把嘴直接親了下去，二人的嘴唇死死地互相抵住對方的嘴唇，舌頭相互糾纏，有如水乳交融，卻又在酒精的催化下顯得荒淫。
正當兩人親熱之際，一把突兀的聲音卻叫停了兩人的動作：「你想揾個女人陪你唱歌嘅話，我都得㗎。」洪為民拎轉頭，只看見容海恩不知甚麼時候站在他面前。他冷笑道：「我为什么要找一个外父是曱甴的女人？」
容海恩臉色一變，急忙駁斥：「雖然我外父係反中亂港分子，但係我同我老公都深愛住中國，希望可以加入體制為國家出一分力。」
洪為民啐了一口，語氣極之粗鄙刻薄：「你嘴上嚷嚷我就要信吗？你连背景審查也过不了还要进体制，臭婊子以为自己逼里镶金么？」
「我哋已經斷絕同袁弓夷嘅任何聯絡，好快，我好快就會登報斷絕爺媳關係 一一」
​未等容海恩把這卑微的表忠說完，身後一隻大手猛地伸了過來。何君堯一臉嫌惡地一掌將她推開，粗暴地打斷了這場尷尬的鬧劇。"
