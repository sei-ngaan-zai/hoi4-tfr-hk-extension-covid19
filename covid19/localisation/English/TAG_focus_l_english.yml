l_english:
  focus_1:0 "疫症時代"
  focus_1_desc:0 "本港已出現第一宗武漢肺炎個案，標誌疫症時代的來臨。"

  focus_2:0 "方艙醫院真神奇"
  focus_2_desc:0 "武漢的火神山及雷神山醫院已經證明了方艙醫院可以有效收容並隔離武肺患者，現時公立醫院床位已經爆滿，我們應該緊跟黨國的步伐走，將方艙醫院引進香港"

  focus_3:0 "倉鼠是香港的麻雀"
  focus_3_desc:0 "毛主席在大躍進時所提出的第一場政治運動便是「除四害」，可見害蟲一向是我國的一大問題。袁國勇醫生已經證明了倉鼠能夠把武肺傳染給人，可見其害處比起麻雀有過之而無不及，作為祖國一點都不能少、不可分割的一部分，我們應效仿毛主席般把香港的倉鼠通通消滅。"

  focus_4:0 "老大哥讓你安心出行"
  focus_4_desc:0 "市民需要用安心出行掃描二維碼才可以進入公共場所，不單可以有效追蹤感染源頭和密切接觸者，還可以用作監視異議人士的一舉一動"
  
  focus_5:0 "押後第七屆立法會選舉"
  focus_5_desc:0 "我們不能冒險讓這麼多「曱甴」乘機進入立法會，武漢肺炎疫情正好可以成為推遲立法會選舉的籍口，讓我們有時間去計劃清算牠們"

  focus_6:0 "全面封關"
  focus_6_desc:0 "強大的民意壓力讓我們迫於無奈下進行封關，尤其是來自極端組織「九十二籤」的炸彈恐怖襲擊及醫管局員工陣綫的大規模罷工。等着瞧吧，你們早晚要付出代價"

  focus_7:0 "全港大圍封"
  focus_7_desc:0 "疫情的危險性遠高於預期，事到如今只能逐區圍封強檢找出隱藏患者了"

  focus_8:0 "武肺疫苗接種計劃"
  focus_8_desc:0 "疫情在一年後仍然肆虐，甚至變得愈來愈嚴重，幸好復必泰及來自祖國的科興疫苗已經可以大規模生產。雖然科興疫苗仍然未通過任何同行評審，但是我們仍然需要儘快訂購及推行免費接種，以結束這場世紀疫症"

  focus_9:0 "嚟迪士尼做足準備"
  focus_9_desc:0 "提起竹篙灣總會聯想到迪士尼，因此我們將會在竹篙灣興建一個大型隔離營，並提供免費住宿及美味佳餚，讓市民不用置身於迪士尼樂園也能享受賓至如歸的感覺“
